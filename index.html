<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
		<meta name="theme-color" content="#0b0f17">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
		<title>JUIL — Jeebus' Universal Interface Library</title>
		<link rel="icon" href="favicon.ico" sizes="any">
		<link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
		<link rel="stylesheet" href="https://woahitsjeebus.github.io/JUIL/assets/site.css">
		<link rel="stylesheet" href="./assets/site.css">
	</head>

	<body>
		<!-- ── Infinite draggable grid ──────────────────────────── -->
		<div id="gridViewport">
			<div id="gridSurface">
				<div id="gridCursorGlow"></div>
				<div id="gridGlow"></div>
				<div id="gridOrigin"></div>
				<div class="hero">
					<h1>Jeebus' &nbsp;To-Do List Manager</h1>
					<div class="sub">drag the grid — explore the void</div>
					<code class="inline versionBadge" id="versionCode">v—</code>
				</div>
			</div>
		</div>

		<!-- ── Floating UI layer (tab bar only) ─────────────────── -->
		<div id="gridContent">
			<div class="tabsBar" style="width:100%;">
				<nav class="tabs"><a class="tabBtn active" data-tab="home" href="./"><span class="tabDot"></span>Home</a><a class="tabBtn" data-tab="settings" href="https://woahitsjeebus.github.io/JUIL/pages/settings/"><span class="tabDot"></span>Settings</a><a class="tabBtn" data-tab="about" href="./pages/about/"><span class="tabDot"></span>About</a></nav>
			</div>
		</div>

		<!-- ── Add button (top-right) ──────────────────────────── -->
		<div id="addBtnWrap">
			<button id="addBtn" aria-label="Add item">+</button>
			<div id="addDropdown">
				<button data-action="entry">Add Entry</button>
				<button data-action="section">Add Section</button>
			</div>
		</div>

		<!-- ── Coordinate readout ──────────────────────────────── -->
		<div id="coordPill">0, 0</div>

		<script type="module">
			import { initPage, loadVersionBadge, initGridDrag } from "./assets/site.js"
			import { initBoard } from "./assets/board.js"
			initPage("home")
			loadVersionBadge()
			const grid = initGridDrag()
			initBoard(grid)
		</script>
	</body>
</html>
